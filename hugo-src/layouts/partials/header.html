{{ $nav := site.Data.navigation }}
<style>
    .site-header {
        display: block;
        position: sticky;
        top: 0;
        z-index: 10000;
        background-color: #05140a;
        border-bottom: 2px solid #1a4225;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        overflow: visible;
    }

    .site-header .header-container {
        position: relative;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 40px;
        overflow: visible;
    }

    .site-header .pcb-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        pointer-events: none;
        z-index: 0;
    }

    .site-header .content {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
    }

    .site-header .logo,
    .site-header .logo img {
        display: block;
    }

    .site-header .logo img {
        height: 40px;
    }

    .site-header nav ul.nav-links {
        display: flex;
        gap: 30px;
        list-style: none;
        margin: 0;
        padding: 0;
        align-items: center;
    }

    .site-header nav ul.nav-links > li > a {
        color: var(--text-main);
        text-decoration: none;
        font-size: 1rem;
        font-weight: bold;
        transition: color 0.3s;
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .site-header nav ul.nav-links > li > a:hover,
    .site-header nav ul.nav-links > li > a[aria-current="page"] {
        color: var(--pcb-glow);
    }

    .site-header .has-dropdown {
        position: relative;
    }

    .site-header .dropdown-trigger {
        cursor: pointer;
    }

    .site-header .arrow {
        font-size: 0.7rem;
        transition: transform 0.3s ease;
        display: inline-block;
        margin-left: 3px;
    }

    .site-header .has-dropdown:hover .arrow,
    .site-header .has-dropdown.is-open .arrow {
        transform: rotate(180deg);
    }

    .site-header .mega-menu {
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: rgba(5, 20, 10, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid var(--pcb-trace);
        border-top: 3px solid var(--pcb-glow);
        border-radius: 8px;
        padding: 30px;
        display: flex;
        gap: 40px;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
        z-index: 10001;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        pointer-events: none;
    }

    .site-header .has-dropdown::after {
        content: "";
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        height: 20px;
        background: transparent;
    }

    .site-header .has-dropdown:hover .mega-menu,
    .site-header .has-dropdown.is-open .mega-menu,
    .site-header .has-dropdown:focus-within .mega-menu {
        opacity: 1;
        visibility: visible;
        transform: translateX(-50%) translateY(10px);
        pointer-events: auto;
    }

    .site-header .mega-column {
        min-width: 180px;
    }

    .site-header .mega-column h4 {
        color: #fff;
        font-size: 1.1rem;
        margin-bottom: 15px;
        border-bottom: 1px solid var(--pcb-trace);
        padding-bottom: 10px;
        display: block;
    }

    .site-header .mega-column ul {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 0;
        margin: 0;
    }

    .site-header .mega-column a {
        color: var(--text-main);
        text-decoration: none;
        font-size: 0.95rem;
        transition: color 0.3s, padding-left 0.3s;
        display: inline-block;
    }

    .site-header .mega-column a:hover {
        color: var(--pcb-glow);
        padding-left: 5px;
    }

    .site-header .menu-toggle {
        display: none;
        flex-direction: column;
        cursor: pointer;
        gap: 6px;
        background: transparent;
        border: 0;
        padding: 8px;
    }

    .site-header .menu-toggle span {
        width: 30px;
        height: 3px;
        background-color: #00ff41;
        transition: 0.3s;
        border-radius: 2px;
    }

    .site-header .beam {
        stroke-dasharray: 80 2500;
        stroke-linecap: round;
    }

    .site-header .beam-1 {
        animation: header-flow 4s linear infinite;
    }

    .site-header .beam-2 {
        animation: header-flow 5s linear infinite;
        animation-delay: -2s;
    }

    .site-header .beam-3 {
        animation: header-flow 6s linear infinite;
        animation-delay: -1s;
    }

    @keyframes header-flow {
        from { stroke-dashoffset: 2500; }
        to { stroke-dashoffset: 0; }
    }

    @media (max-width: 992px) {
        .site-header .header-container {
            padding: 0 20px;
        }

        .site-header .pcb-bg {
            opacity: 0.3;
        }

        .site-header .menu-toggle {
            display: flex;
            z-index: 2;
        }

        .site-header nav ul.nav-links {
            position: fixed;
            top: 80px;
            right: 0;
            width: 300px;
            height: calc(100vh - 80px);
            background: rgba(5, 20, 10, 0.98);
            backdrop-filter: blur(15px);
            flex-direction: column;
            align-items: flex-start;
            padding: 40px 20px;
            transform: translateX(100%);
            transition: transform 0.4s ease;
            overflow-y: auto;
            border-left: 1px solid var(--pcb-trace);
        }

        .site-header nav ul.nav-links.active {
            transform: translateX(0);
        }

        .site-header nav ul.nav-links > li {
            width: 100%;
            margin-bottom: 20px;
        }

        .site-header .mega-menu {
            position: static;
            transform: none;
            opacity: 1;
            visibility: visible;
            box-shadow: none;
            border: none;
            background: transparent;
            padding: 10px 0 0 15px;
            flex-direction: column;
            gap: 20px;
            display: none;
            pointer-events: auto;
        }

        .site-header .has-dropdown:hover .mega-menu,
        .site-header .has-dropdown.is-open .mega-menu,
        .site-header .has-dropdown:focus-within .mega-menu {
            display: flex;
            transform: none;
        }

        .site-header .mega-column h4 {
            font-size: 1rem;
            margin-bottom: 10px;
            color: var(--pcb-glow);
        }
    }
</style>

<header class="site-header">
    <div class="header-container">
        <svg class="pcb-bg" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 80" aria-hidden="true">
            <defs>
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="3" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
            </defs>
            <g stroke="#1a4225" stroke-width="2" fill="none">
                <path d="M-10,20 H300 L320,40 H800 L820,20 H1500 L1520,40 H1950" />
                <path d="M-10,60 H400 L420,30 H900 L920,60 H1400 L1420,30 H1950" />
                <path d="M600,80 L620,50 H1100 L1120,80" />
            </g>
            <g fill="#1a4225">
                <circle cx="300" cy="20" r="3"/>
                <circle cx="320" cy="40" r="3"/>
                <circle cx="400" cy="60" r="3"/>
                <circle cx="420" cy="30" r="3"/>
                <circle cx="800" cy="40" r="3"/>
                <circle cx="820" cy="20" r="3"/>
            </g>
            <g stroke="#ffcc00" stroke-width="2" fill="none" filter="url(#glow)">
                <path class="beam beam-1" d="M-10,20 H300 L320,40 H800 L820,20 H1500 L1520,40 H1950" />
                <path class="beam beam-2" d="M-10,60 H400 L420,30 H900 L920,60 H1400 L1420,30 H1950" />
                <path class="beam beam-3" d="M600,80 L620,50 H1100 L1120,80" />
            </g>
        </svg>

        <div class="content">
            <a href="{{ "/" | relURL }}" class="logo" aria-label="XingFeng PCB home">
                <img src="{{ "/images/xf-logo.png" | relURL }}" alt="XingFeng PCB Logo">
            </a>

            <button class="menu-toggle" type="button" aria-label="Open navigation menu" aria-controls="primary-nav" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav aria-label="Primary navigation">
                <ul class="nav-links" id="primary-nav">
                    {{ range $nav.main }}
                    {{ if .columns }}
                    <li class="has-dropdown">
                        <a href="{{ .url | relURL }}" class="dropdown-trigger" {{ if eq $.RelPermalink .url }}aria-current="page"{{ end }}>
                            {{ .title }} <span class="arrow">▼</span>
                        </a>
                        <div class="mega-menu">
                            {{ range .columns }}
                            <div class="mega-column">
                                <h4>{{ .heading }}</h4>
                                <ul>
                                    {{ range .links }}
                                    <li><a href="{{ .url | relURL }}">{{ .title }}</a></li>
                                    {{ end }}
                                </ul>
                            </div>
                            {{ end }}
                        </div>
                    </li>
                    {{ else }}
                    <li><a href="{{ .url | relURL }}" {{ if eq $.RelPermalink .url }}aria-current="page"{{ end }}>{{ .title }}</a></li>
                    {{ end }}
                    {{ end }}
                </ul>
            </nav>
        </div>
    </div>
</header>
